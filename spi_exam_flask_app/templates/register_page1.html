<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>サービス登録1</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='static/register.css') }}">
</head>
<body>
<div class="wrapper">
  <div class="header-logo">バウソクＳＰＩ</div>
  <p class="description">就活に必要なサービスをまとめて登録！<br>複数の就活サービスを利用して、効率的に就活を進めましょう。</p>

  <div class="service">
    <img src="{{ url_for('static', filename='static/mycareer_logo.png') }}" alt="マイキャリ">
    <div class="content">
      <h3>マイキャリ</h3>
      <p>登録者数50万人以上の就活サービス「マイキャリ」。エントリー、企業比較ができるだけでなく、500社以上の企業の説明会へ参加できます。</p>
      <label class="terms"><input type="checkbox"> <a href="#">利用規約</a>、<a href="#">プライバシーポリシー</a>に同意の上登録する。<br>また、ご案内のメールを受け取る。</label>
    </div>
  </div>

  <div class="service">
    <img src="{{ url_for('static', filename='static/jobtv_logo.png') }}" alt="JOBTV">
    <div class="content">
      <h3>JOBTV</h3>
      <p>説明会や先輩インタビューなどの採用動画で、企業理解を深めることができるサイトです。</p>
      <label class="terms"><input type="checkbox"> <a href="#">利用規約</a>、<a href="#">プライバシーポリシー</a>に同意の上登録する。<br>また、ご案内のメールを受け取る。</label>
    </div>
  </div>

  <button class="register-btn">登録を完了する</button>
</div>
</body>
</html>
