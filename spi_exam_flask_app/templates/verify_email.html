{% extends "base.html" %}
{% block title %}メール未確認{% endblock %}
{% block content %}
  <h2>メール未確認</h2>
  <p>アカウントをご利用になるには、メールアドレスの確認が必要です。</p>
  <p>登録時に送信されたメールのリンクをクリックしてください。</p>
  <p><a class="button-link" href="{{ url_for('resend') }}">確認メールを再送</a></p>
  <p>確認後はこのページをリロードするか、再度サインインしてください。</p>
{% endblock %}
