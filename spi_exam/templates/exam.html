<!-- spi_exam/exam/exam.html -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>模擬試験</title>

  <!-- 既存のビルド済み CSS があるなら流用（パスはあなたのリポジトリに合わせて調整） -->
  <link rel="preload" as="style" href="../build/assets/app-CiUQVDEA.css" />
  <link rel="stylesheet" href="../build/assets/app-CiUQVDEA.css" />

  <style>
    /* 最低限の見た目。必要に応じて既存 CSS に寄せて調整してください。 */
    .exam-header{display:flex;justify-content:space-between;align-items:center;margin:1rem 0}
    .subject{color:#2f98a5;font-weight:bold}
    .progress-bars{display:flex;gap:6px}
    .progress-bars .bar{width:22px;height:6px;border-radius:4px;background:#e5e7eb}
    .progress-bars .bar.done{background:#2f98a5}
    .progress-bars .bar.current{background:#f59e0b}
    .timer-wrap{display:flex;align-items:center;gap:16px}
    .timer-svg{transform:rotate(-90deg)}
    .timer-bg{fill:none;stroke:#eee;stroke-width:8}
    .timer-progress{fill:none;stroke:#2f98a5;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 999}
    .timer-text{font-size:18px;dominant-baseline:middle}
    .question-title{margin:1rem 0 .5rem;font-weight:bold}
    .options-list{display:grid;gap:.5rem;margin:1rem 0}
    .option-item{display:flex;gap:.5rem;align-items:flex-start;background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:.75rem}
    .option-item.selected{outline:2px solid #2f98a5}
    .next-button{display:inline-flex;align-items:center;justify-content:center;margin-top:1rem;background:#f65b11;color:#fff;border-radius:9999px;height:40px;width:240px;border:0;font-weight:bold}
    .error{color:#b91c1c;background:#fee2e2;border:1px solid #fecaca;padding:.75rem;border-radius:.5rem}
  </style>
</head>
<body class="exam-page">
  <div class="container">
    <header class="header">
      <div class="logo-container">
        <a href="../index.html" class="logo-link">
          <div class="logo"></div><span class="site-title">バクソクＳＰＩ</span>
        </a>
      </div>
    </header>

    <main class="main-content">
      <div id="app" data-index="../data/exams/index.json">
        <!-- JS がレンダリングします -->
        <p>読み込み中…</p>
      </div>
    </main>

    <footer class="footer">
      <nav class="footer-nav">
        <a href="../terms.html">利用規約</a>
        <a href="../index.html">TOPへ</a>
      </nav>
    </footer>
  </div>

  <script type="module" src="../js/exam.js"></script>
</body>
</html>
