<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>パスワード変更 | 就活SPI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="my-page mypage-settings-page">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NFD53MZ9"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

  <header class="mypage-header">
    <a class="mypage-logo signin-logo" href="../index.html" aria-label="トップページへ">
      <span class="signin-logo-mark" aria-hidden="true"></span>
      <span class="signin-logo-text">さくっとSPI</span>
    </a>
    <div class="mypage-header-actions">
      <a class="mypage-outline-button" href="my_page.html">マイページへ戻る</a>
      <span class="mypage-avatar" aria-hidden="true">👤</span>
    </div>
  </header>
  <main class="mypage-main mypage-settings-main">
    <section class="mypage-settings-heading" aria-label="ページタイトル">
      <span class="mypage-user-badge" aria-hidden="true"></span>
      <h1>パスワード変更</h1>
    </section>

    <section class="mypage-panel mypage-settings-panel">
      <p class="mypage-settings-subtitle">
        現在のパスワードを確認して、新しいパスワードへ更新します。<br />
        セキュリティ向上のため、定期的な見直しをおすすめします。
      </p>
      <form class="auth-form mypage-settings-form" action="#" method="post">
        <div class="input-group">
          <label for="current-password">現在のパスワード</label>
          <input id="current-password" type="password" name="current-password" placeholder="現在のパスワード" required />
        </div>
        <div class="input-group">
          <label for="new-password">新しいパスワード</label>
          <input id="new-password" type="password" name="new-password" placeholder="半角英数字8文字以上" required />
        </div>
        <div class="input-group">
          <label for="confirm-password">新しいパスワード（確認）</label>
          <input id="confirm-password" type="password" name="confirm-password" placeholder="もう一度入力してください" required />
        </div>
        <button class="primary-button" type="submit">パスワードを更新する</button>
      </form>
      <div class="form-note mypage-settings-note">
        <p>ログインに問題がある場合は <a href="../auth/reset_password.html">パスワード再設定</a> をご利用ください。</p>
      </div>
    </section>
  </main>
  <footer class="mypage-footer">
    <p class="copyright">© Sakutto-SPI. All Rights Reserved</p>
    <div class="footer-links">
      <a href="../terms.html">利用規約</a>
      <a href="../privacy.html">個人情報保護方針</a>
    </div>
  </footer>

  <script type="module" src="./js/pages/change_password.js"></script>
</body>
</html>
