    <!-- 共通CSS（homeページ完全統一版） -->
    <style>
    /* ================================================
       共通レイアウトCSS（homeページ完全統一版）
       ================================================ */
    
    /* 基本リセット・設定 */
    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html {
        font-size: 100%;
        scroll-behavior: smooth;
    }

    body {
        font-family: 'Roboto', sans-serif;
        font-size: 1rem;
        line-height: 1.65;
        color: #333;
        background-color: #f4f6f8;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    /* スクリーンリーダー向けユーティリティクラス */
    .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    /* 全体コンテナ */
    .container {
        width: 100%;
        max-width: 800px;
        min-height: 100vh;
        background-color: #fff;
        margin: 0 auto;
        padding: 0;
        box-shadow: 0 0 15px rgba(0,0,0,0.05);
    }
    
    /* 受験画面では最小高を調整 */
    body.exam-page .container {
        min-height: auto;
    }

    /* ヘッダー（homeページ完全統一） */
    .header {
        height: 65px;
        background-color: #f8f9fa;
        display: flex;
        align-items: center;
        padding: 0 20px;
        border-bottom: 1px solid #e0e0e0;
    }

    .logo-container {
        display: flex;
        align-items: center;
    }

    .logo {
        width: 35px;
        height: 35px;
        background-image: url('/images/v1_5.png');
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        margin-right: 10px;
    }

    .site-title {
        color: #2f98a5;
        font-weight: bold;
        font-size: 1.25rem;
        text-decoration: none;
    }

    .logo-link {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: inherit;
        transition: opacity 0.2s ease;
    }

    .logo-link:hover {
        opacity: 0.8;
    }

    .logo-link:hover .site-title {
        color: #247a85;
    }

    /* ログアウトボタン */
    .logout-btn:hover {
        background-color: #2f98a5 !important;
        color: #fff !important;
    }

    /* メインコンテンツ */
    .main-content {
        padding: 0 20px 2rem;
    }

    /* フッター（homeページのv1_4スタイル完全統一） */
    .footer {
        background-color: #f8f9fa;
        padding: 1.5rem 20px;
        border-top: 1px solid #e0e0e0;
    }

    .footer-nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem 1.5rem;
    }

    .footer-nav a {
        color: #555;
        font-size: 0.8125rem;
        text-decoration: none;
        transition: color 0.2s ease;
    }

    .footer-nav a:hover {
        color: #2f98a5;
        text-decoration: underline;
    }

    /* レスポンシブ対応（homeページ統一） */
    @media (max-width: 600px) {
        .main-content {
            padding: 0 15px 2rem;
        }
        
        .header {
            padding: 0 16px;
        }
        
        .footer {
            padding: 1.5rem 15px;
        }
    }

    @media (max-width: 480px) {
        html {
            font-size: 93.75%;
        }
        
        .header {
            height: 60px;
            padding: 0 15px;
        }
        
        .logo { 
            width: 30px; 
            height: 30px; 
        }
        
        .site-title { 
            font-size: 1.125rem;
        }

        .main-content {
            padding: 0 15px 1.5rem;
        }

        .footer {
            padding: 1.5rem 15px;
        }

        .footer-nav { 
            gap: 0.5rem 1rem;
        }
        
        .footer-nav a { 
            font-size: 0.75rem;
        }
        
        /* ヘッダーのレスポンシブ対応 */
        .logout-btn {
            font-size: 0.75rem !important;
            padding: 4px 8px !important;
        }
    }

    <!-- ページ固有CSS -->
    <style>
/* ================================================
   パスワード再設定ページ専用CSS
   ================================================ */

/* メインコンテンツのカスタマイズ */
.main-content {
  padding: 30px 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: calc(100vh - 65px - 120px);
}

/* パスワード再設定コンテナ */
.password-reset-container {
  width: 100%;
  max-width: 350px;
  padding: 0 20px;
}

/* タイトル */
.page-title {
  text-align: center;
  color: #2f98a5;
  font-weight: bold;
  font-size: 1.25rem;
  margin-bottom: 30px;
}

/* フォームスタイル */
.password-reset-form {
  width: 100%;
}

.form-group {
  margin-bottom: 25px;
}

.form-label {
  display: block;
  color: #333;
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  height: 45px;
  padding: 0 15px;
  border: 1px solid #949494;
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Roboto', sans-serif;
  background-color: #fff;
  transition: border-color 0.2s ease;
  box-sizing: border-box;
}

.form-input:focus {
  outline: none;
  border-color: #2f98a5;
  box-shadow: 0 0 0 2px rgba(47, 152, 165, 0.1);
}

/* 送信ボタン */
.btn-submit {
  width: 100%;
  height: 45px;
  background-color: #2f98a5;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  font-size: 14px;
  font-family: 'Roboto', sans-serif;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-bottom: 20px;
}

.btn-submit:hover {
  background-color: #267a85;
  transform: translateY(-1px);
}

/* ステータスメッセージ */
.status-message {
  background-color: #f0f9ff;
  border: 1px solid #0ea5e9;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 25px;
  color: #0c4a6e;
  font-size: 14px;
  text-align: center;
}

/* エラーメッセージ */
.error-message {
  color: #dc2626;
  font-size: 12px;
  margin-top: 5px;
}

/* 戻るリンク */
.back-link-section {
  text-align: center;
  font-size: 14px;
  color: #333;
}

.back-link {
  color: #2f98a5;
  text-decoration: underline;
  transition: color 0.2s ease;
}

.back-link:hover {
  color: #267a85;
}

/* レスポンシブ対応 */
@media (max-width: 480px) {
  .main-content {
    padding: 20px 15px;
  }
  
  .password-reset-container {
    padding: 0 10px;
  }
  
  .page-title {
    font-size: 1.125rem;
    margin-bottom: 25px;
  }
  
  .form-input {
    font-size: 16px; /* モバイルでのズーム防止 */
  }
}

@media (max-width: 320px) {
  .main-content {
    padding: 15px 10px;
  }
  
  .form-input {
    height: 40px;
    padding: 0 12px;
  }
  
  .btn-submit {
    height: 40px;
    font-size: 13px;
  }
}
</style>
